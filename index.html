<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sleek Wedding App (Secure Edition)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Kantumruy+Pro:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-app: #f4f6f8; --bg-card: #ffffff;
            --primary: #465345; --primary-light: #5a6b59; --accent: #d4b886;
            --danger: #ef4444; --success: #10b981;
            --text-main: #1d1d1f; --text-muted: #86868b; --border: #e8e8ed;
            --radius-xl: 30px; --radius-lg: 20px; --radius-md: 14px;
            --shadow-soft: 0 8px 24px rgba(149, 157, 165, 0.12);
        }

        /* --- SECURITY UPGRADE: Disable Text Selection & Dragging --- */
        * { 
            box-sizing: border-box; margin: 0; padding: 0; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Montserrat', 'Kantumruy Pro', sans-serif; 
            
            /* Anti-Copy */
            -webkit-user-select: none; /* Safari */
            -ms-user-select: none; /* IE 10+ */
            user-select: none; /* Standard */
            -webkit-user-drag: none; /* Prevent dragging images/elements */
        }

        /* Allow typing in inputs ONLY */
        input, select, textarea {
            -webkit-user-select: auto;
            user-select: auto;
        }

        body { background-color: #e5e5ea; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .app-container {
            background-color: var(--bg-app); width: 100%; max-width: 430px; height: 100vh; max-height: 932px;
            position: relative; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        @media (min-width: 431px) { .app-container { height: 90vh; border-radius: 40px; border: 8px solid #fff; } }

        header { padding: 30px 25px 15px; display: flex; justify-content: space-between; align-items: center; background: var(--bg-app); z-index: 10; }
        .user-greeting p { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; }
        .user-greeting h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; color: var(--primary); line-height: 1.2; }

        .view-content { flex: 1; overflow-y: auto; padding: 0 25px 100px; -webkit-overflow-scrolling: touch; display: none; animation: fadeIn 0.3s ease; }
        .view-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Dashboard */
        .summary-card { background: var(--primary); border-radius: var(--radius-xl); padding: 25px; color: white; margin-bottom: 20px; position: relative; overflow: hidden; box-shadow: 0 15px 30px rgba(70, 83, 69, 0.3); }
        .summary-card::before, .summary-card::after { content: ''; position: absolute; border-radius: 50%; background: rgba(255,255,255,0.05); }
        .summary-card::before { width: 150px; height: 150px; top: -50px; right: -50px; }
        .summary-card::after { width: 100px; height: 100px; bottom: -20px; left: -20px; }
        .summary-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; margin-bottom: 5px; }
        .summary-amount { font-family: 'Cormorant Garamond', serif; font-size: 2.8rem; font-weight: 600; line-height: 1; margin-bottom: 20px; }
        
        .sub-stats { display: flex; gap: 15px; }
        .sub-stat-box { background: rgba(255,255,255,0.1); padding: 12px 15px; border-radius: var(--radius-md); flex: 1; backdrop-filter: blur(10px); }
        .sub-stat-box p { font-size: 0.65rem; text-transform: uppercase; opacity: 0.8; margin-bottom: 3px; }
        .sub-stat-box h3 { font-size: 1.1rem; font-weight: 600; }

        .analytics-container { margin-top: 15px; background: rgba(0,0,0,0.15); border-radius: 50px; height: 6px; display: flex; overflow: hidden; }
        .bar-groom { background: #60a5fa; height: 100%; transition: width 0.5s; }
        .bar-bride { background: #f43f5e; height: 100%; transition: width 0.5s; }
        .analytics-labels { display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.65rem; opacity: 0.9; }
        .section-title { font-size: 1.1rem; color: var(--text-main); font-weight: 600; margin: 25px 0 15px; }

        /* Form */
        .form-container { background: var(--bg-card); padding: 25px; border-radius: var(--radius-xl); box-shadow: var(--shadow-soft); transition: 0.3s; }
        .form-container.edit-mode { border: 2px solid var(--accent); }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.75rem; color: var(--text-muted); font-weight: 500; margin-bottom: 8px; }
        
        input, select { width: 100%; background: var(--bg-app); border: 1px solid transparent; padding: 16px; border-radius: var(--radius-md); font-size: 0.95rem; color: var(--text-main); outline: none; transition: 0.3s; -webkit-appearance: none; }
        input:focus, select:focus { background: var(--bg-card); border-color: var(--primary); box-shadow: 0 0 0 4px rgba(70, 83, 69, 0.1); }
        .select-wrapper { position: relative; }
        .select-wrapper::after { content: '⌄'; font-size: 1.2rem; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--text-muted); }

        .quick-chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; margin-top: -10px; margin-bottom: 15px; -webkit-overflow-scrolling: touch; }
        .chip { background: var(--bg-app); border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; color: var(--text-muted); cursor: pointer; white-space: nowrap; font-weight: 500; transition: 0.2s; }
        .chip:active, .chip:hover { background: var(--primary); color: white; border-color: var(--primary); }

        .btn-submit { width: 100%; padding: 18px; border: none; border-radius: var(--radius-md); background: var(--primary); color: white; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: 0.2s; box-shadow: 0 8px 20px rgba(70, 83, 69, 0.25); margin-top: 5px; }

        /* Registry */
        .search-container { position: relative; margin-bottom: 20px; }
        .search-container input { padding-left: 45px; background: var(--bg-card); box-shadow: var(--shadow-soft); border: none; }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; stroke: var(--text-muted); fill: none; }

        .list-actions { display: flex; gap: 10px; margin-bottom: 20px; }
        .list-actions button { flex: 1; padding: 12px; border: none; border-radius: var(--radius-md); font-size: 0.75rem; font-weight: 600; cursor: pointer; }
        .btn-export { background: #e3f2fd; color: #1565c0; }
        .btn-clear { background: #ffebee; color: #c62828; }

        .guest-list { display: flex; flex-direction: column; gap: 15px; }
        .guest-card { background: var(--bg-card); border-radius: var(--radius-lg); padding: 18px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-soft); position: relative; }
        .guest-info h4 { font-size: 1rem; color: var(--text-main); margin-bottom: 4px; }
        .guest-info p { font-size: 0.7rem; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
        .badge { padding: 3px 8px; border-radius: 6px; font-size: 0.65rem; font-weight: 600; }
        .badge.groom { color: #1976d2; background: #e3f2fd; }
        .badge.bride { color: #c2185b; background: #fce4ec; }

        .guest-amount { text-align: right; }
        .guest-amount h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: var(--primary); margin-bottom: 5px; }
        
        .card-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .btn-action { background: transparent; border: none; font-size: 0.7rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px; opacity: 0.7; transition: 0.2s; }
        .btn-action.edit { color: var(--primary); }
        .btn-action.delete { color: var(--danger); }
        .btn-action:hover { opacity: 1; }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }

        /* Toast */
        .toast { position: absolute; top: -100px; left: 50%; transform: translateX(-50%); background: #2b322a; color: white; padding: 12px 24px; border-radius: 50px; font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: top 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); z-index: 100; white-space: nowrap; }
        .toast.show { top: 20px; }
        .toast-icon { background: var(--success); border-radius: 50%; width: 20px; height: 20px; display: flex; justify-content: center; align-items: center; }

        /* Bottom Nav */
        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border-top-left-radius: var(--radius-xl); border-top-right-radius: var(--radius-xl); display: flex; justify-content: space-around; align-items: center; padding: 15px 10px 25px; z-index: 20; box-shadow: 0 -5px 25px rgba(0,0,0,0.05); }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: var(--text-muted); cursor: pointer; width: 60px; }
        .nav-item svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .nav-item span { font-size: 0.65rem; font-weight: 600; }
        .nav-item.active { color: var(--primary); }
        .nav-item.active svg { transform: translateY(-3px); transition: 0.3s; }
        .nav-item.center-btn { background: var(--primary); color: white; border-radius: 50%; width: 55px; height: 55px; justify-content: center; transform: translateY(-20px); box-shadow: 0 10px 20px rgba(70, 83, 69, 0.3); }
        .nav-item.center-btn svg { width: 28px; height: 28px; }
        .nav-item.center-btn span { display: none; }
    </style>
</head>
<body>

    <!-- SECURITY UPGRADE: Anti-Inspect & Anti-Right-Click Script -->
    <script>
        // 1. Disable Right Click (Context Menu)
        document.addEventListener('contextmenu', event => event.preventDefault());

        // 2. Disable Keyboard Shortcuts (F12, Ctrl+Shift+I, etc.)
        document.onkeydown = function(e) {
            // Block F12
            if(e.keyCode == 123) {
                return false;
            }
            // Block Ctrl+Shift+I (Inspect)
            if(e.ctrlKey && e.shiftKey && e.keyCode == 73){
                return false;
            }
            // Block Ctrl+Shift+J (Console)
            if(e.ctrlKey && e.shiftKey && e.keyCode == 74) {
                return false;
            }
            // Block Ctrl+Shift+C (Element Selector)
            if(e.ctrlKey && e.shiftKey && e.keyCode == 67) {
                return false;
            }
            // Block Ctrl+U (View Source)
            if(e.ctrlKey && e.keyCode == 85) {
                return false;
            }
            // Block Ctrl+S (Save Page)
            if(e.ctrlKey && e.keyCode == 83) {
                return false;
            }
            // Block Ctrl+P (Print)
            if(e.ctrlKey && e.keyCode == 80) {
                return false;
            }
        }
    </script>

    <div class="app-container">
        
        <!-- Smart Toast -->
        <div id="toast" class="toast">
            <div class="toast-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
            <span id="toast-msg">Saved Successfully!</span>
        </div>

        <!-- Header -->
        <header>
            <div class="user-greeting">
                <p id="current-date">Today's Date</p>
                <h1>Loovio Event</h1>
            </div>
        </header>

        <!-- VIEW 1: DASHBOARD -->
        <main id="view-home" class="view-content active">
            <div class="summary-card">
                <p class="summary-title">Total Balance (USD)</p>
                <h2 id="total-usd" class="summary-amount">$0.00</h2>
                <div class="sub-stats">
                    <div class="sub-stat-box">
                        <p>Total (KHR)</p>
                        <h3 id="total-khr">0 ៛</h3>
                    </div>
                    <div class="sub-stat-box">
                        <p>Honored Guests</p>
                        <h3 id="total-guests">0</h3>
                    </div>
                </div>
                <div class="analytics-container">
                    <div id="bar-groom" class="bar-groom" style="width: 50%;"></div>
                    <div id="bar-bride" class="bar-bride" style="width: 50%;"></div>
                </div>
                <div class="analytics-labels">
                    <span>Groom: <b id="pct-groom">50%</b></span>
                    <span>Bride: <b id="pct-bride">50%</b></span>
                </div>
            </div>
            <h3 class="section-title">Recent Activity</h3>
            <div id="recent-list" class="guest-list"></div>
        </main>

        <!-- VIEW 2: ADD/EDIT FORM -->
        <main id="view-add" class="view-content">
            <h3 id="form-title" class="section-title" style="margin-top: 0;">Record a Gift</h3>
            <div id="form-card" class="form-container">
                <form id="gift-form">
                    <div class="input-group">
                        <label>Guest Full Name</label>
                        <input type="text" id="guestName" placeholder="e.g., San Sokchea" autocomplete="off" required>
                    </div>
                    <div class="input-group">
                        <label>Amount Provided</label>
                        <input type="number" id="amount" placeholder="0" min="1" required>
                    </div>
                    
                    <div class="quick-chips">
                        <div class="chip" onclick="setQuickAmount(20, 'USD')">$20</div>
                        <div class="chip" onclick="setQuickAmount(50, 'USD')">$50</div>
                        <div class="chip" onclick="setQuickAmount(100, 'USD')">$100</div>
                        <div class="chip" onclick="setQuickAmount(50000, 'KHR')">50,000 ៛</div>
                        <div class="chip" onclick="setQuickAmount(100000, 'KHR')">100,000 ៛</div>
                    </div>

                    <div class="input-group">
                        <label>Currency</label>
                        <div class="select-wrapper">
                            <select id="currency">
                                <option value="USD">US Dollar ($)</option>
                                <option value="KHR">Cambodian Riel (៛)</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Guest Of</label>
                        <div class="select-wrapper">
                            <select id="side">
                                <option value="Both">Both (ទាំងសងខាង)</option>
                                <option value="Bride">The Bride (ខាងស្រី)</option>
                                <option value="Groom">The Groom (ខាងប្រុស)</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" id="btn-submit" class="btn-submit">Add to Registry</button>
                    <button type="button" id="btn-cancel-edit" class="btn-submit" style="background: var(--bg-app); color: var(--text-main); display: none; box-shadow: none;" onclick="resetFormToAdd()">Cancel Edit</button>
                </form>
            </div>
        </main>

        <!-- VIEW 3: REGISTRY & SEARCH -->
        <main id="view-list" class="view-content">
            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="searchInput" placeholder="Search guest name..." onkeyup="filterGuests()">
            </div>
            <div class="list-actions">
                <button class="btn-export" onclick="exportToCSV()">Export CSV</button>
                <button class="btn-clear" onclick="clearAllData()">Clear Data</button>
            </div>
            <div id="full-list" class="guest-list"></div>
        </main>

        <!-- BOTTOM NAV -->
        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('home', this)">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span>Home</span>
            </div>
            <div class="nav-item center-btn" onclick="switchTab('add', this)">
                <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                <span>Add</span>
            </div>
            <div class="nav-item" onclick="switchTab('list', this)">
                <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                <span>Registry</span>
            </div>
        </nav>

    </div>

    <!-- MAIN APP SCRIPT -->
    <script>
        document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
        let gifts = JSON.parse(localStorage.getItem('loovioRegistryApp')) || [];
        let editModeId = null; 

        function switchTab(tabId, element) {
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            element.classList.add('active');
            document.querySelectorAll('.view-content').forEach(view => view.classList.remove('active'));
            document.getElementById('view-' + tabId).classList.add('active');
            if(tabId === 'add') document.getElementById('guestName').focus(); 
        }

        function formatCurrency(amount, currency) {
            if (currency === 'USD') return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(amount);
            return new Intl.NumberFormat('km-KH').format(amount) + ' ៛';
        }

        function setQuickAmount(amt, curr) {
            document.getElementById('amount').value = amt;
            document.getElementById('currency').value = curr;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = message;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000); 
        }

        function createGuestCard(gift) {
            const sideClass = gift.side === 'Groom' ? 'groom' : gift.side === 'Bride' ? 'bride' : '';
            return `
                <div class="guest-card">
                    <div class="guest-info">
                        <h4>${gift.guestName}</h4>
                        <p><span class="badge ${sideClass}">${gift.side}</span><span>• ${gift.time}</span></p>
                    </div>
                    <div class="guest-amount">
                        <h3>${formatCurrency(gift.amount, gift.currency)}</h3>
                        <div class="card-actions">
                            <button class="btn-action edit" onclick="startEdit('${gift.id}')">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg> Edit
                            </button>
                            <button class="btn-action delete" onclick="deleteRecord('${gift.id}')">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg> Del
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderUI(dataToRender = gifts) {
            const recentContainer = document.getElementById('recent-list');
            const fullContainer = document.getElementById('full-list');
            recentContainer.innerHTML = ''; fullContainer.innerHTML = '';

            if (dataToRender.length === 0) {
                const emptyHTML = `<div class="empty-state"><p>No records found.</p></div>`;
                if(dataToRender === gifts) recentContainer.innerHTML = emptyHTML;
                fullContainer.innerHTML = emptyHTML;
            } else {
                for (let i = dataToRender.length - 1; i >= 0; i--) {
                    const cardHTML = createGuestCard(dataToRender[i]);
                    fullContainer.innerHTML += cardHTML;
                    if (dataToRender === gifts && gifts.length - i <= 3) recentContainer.innerHTML += cardHTML;
                }
            }
            calculateTotals();
        }

        function calculateTotals() {
            let usd = 0, khr = 0, groomCount = 0, brideCount = 0;
            gifts.forEach(g => {
                if(g.currency === 'USD') usd += g.amount; else khr += g.amount;
                if(g.side === 'Groom') groomCount++; else if (g.side === 'Bride') brideCount++; else { groomCount += 0.5; brideCount += 0.5; }
            });
            document.getElementById('total-usd').textContent = formatCurrency(usd, 'USD');
            document.getElementById('total-khr').textContent = formatCurrency(khr, 'KHR');
            document.getElementById('total-guests').textContent = gifts.length;
            
            const totalSided = groomCount + brideCount;
            let groomPct = 50, bridePct = 50;
            if(totalSided > 0) { groomPct = Math.round((groomCount / totalSided) * 100); bridePct = 100 - groomPct; }
            document.getElementById('bar-groom').style.width = groomPct + '%';
            document.getElementById('bar-bride').style.width = bridePct + '%';
            document.getElementById('pct-groom').textContent = groomPct + '%';
            document.getElementById('pct-bride').textContent = bridePct + '%';
        }

        function startEdit(id) {
            const gift = gifts.find(g => g.id === id);
            if(!gift) return;
            
            editModeId = id;
            document.getElementById('guestName').value = gift.guestName;
            document.getElementById('amount').value = gift.amount;
            document.getElementById('currency').value = gift.currency;
            document.getElementById('side').value = gift.side;
            
            document.getElementById('form-title').textContent = 'Update Gift Record';
            document.getElementById('btn-submit').textContent = '💾 Update Record';
            document.getElementById('btn-cancel-edit').style.display = 'block';
            document.getElementById('form-card').classList.add('edit-mode');
            
            switchTab('add', document.querySelectorAll('.nav-item')[1]);
        }

        function resetFormToAdd() {
            editModeId = null;
            document.getElementById('guestName').value = '';
            document.getElementById('amount').value = '';
            
            document.getElementById('form-title').textContent = 'Record a Gift';
            document.getElementById('btn-submit').textContent = 'Add to Registry';
            document.getElementById('btn-cancel-edit').style.display = 'none';
            document.getElementById('form-card').classList.remove('edit-mode');
        }

        document.getElementById('gift-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const guestName = document.getElementById('guestName').value.trim();
            const amount = parseFloat(document.getElementById('amount').value);
            const currency = document.getElementById('currency').value;
            const side = document.getElementById('side').value;
            
            if (!guestName || isNaN(amount) || amount <= 0) return;

            if (editModeId) {
                const index = gifts.findIndex(g => g.id === editModeId);
                gifts[index] = { ...gifts[index], guestName, amount, currency, side };
                showToast(`Updated ${guestName}`);
                resetFormToAdd();
                switchTab('list', document.querySelectorAll('.nav-item')[2]); 
            } else {
                gifts.push({
                    id: Date.now().toString(),
                    guestName, amount, currency, side,
                    time: new Date().toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit'})
                });
                showToast(`✅ Added ${guestName}`);
                
                document.getElementById('guestName').value = '';
                document.getElementById('amount').value = '';
                document.getElementById('guestName').focus();
            }

            localStorage.setItem('loovioRegistryApp', JSON.stringify(gifts));
            renderUI();
        });

        function filterGuests() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            renderUI(gifts.filter(g => g.guestName.toLowerCase().includes(query)));
        }

        function deleteRecord(id) {
            if(confirm("Are you sure you want to delete this record?")) {
                gifts = gifts.filter(g => g.id !== id);
                localStorage.setItem('loovioRegistryApp', JSON.stringify(gifts));
                if(document.getElementById('searchInput').value) filterGuests(); else renderUI();
            }
        }

        function clearAllData() {
            if (gifts.length === 0) return;
            if (confirm("⚠️ WARNING: Clear all registry data?")) {
                gifts = []; localStorage.removeItem('loovioRegistryApp'); document.getElementById('searchInput').value = ''; renderUI();
            }
        }

        function exportToCSV() {
            if (gifts.length === 0) return alert("No records to export.");
            let csv = "ID,Time,Guest Name,Side,Amount,Currency\n";
            gifts.forEach(g => csv += `"${g.id}","${g.time}","${g.guestName}","${g.side}",${g.amount},"${g.currency}"\n`);
            const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
            link.download = "Wedding_Registry.csv"; link.click();
        }

        renderUI();
    </script>
</body>
</html>
